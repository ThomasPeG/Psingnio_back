services:
  - type: web
    name: nest-backend
    env: node
    rootDir: nest
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start:prod"

   # Servicio 2: Python (FastAPI o Flask)
  - type: web
    name: python-api
    env: python
    rootDir: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn main:app --bind 0.0.0.0:10000"
